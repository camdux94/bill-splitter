<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan a Receipt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<meta name="theme-color" content="#2F6F5E">
<style>
  .back-link {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px;
    color: var(--ink-soft); text-decoration: none; margin-bottom: 1rem;
  }
  .receipt-icon { font-size: 26px; }
  .scanned-item-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px dashed var(--line); font-size: 13px;
  }
  .scanned-item-row:last-child { border-bottom: none; }
  .scanned-item-row .amt { font-family: var(--font-mono); color: var(--ink); }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/">← Home</a>
  <div class="header">
    <div class="eyebrow">Scan a Receipt</div>
    <div class="page-title">What did I actually spend?</div>
    <p class="page-sub">Snap a photo for a clean itemized read-out — no group splitting needed.</p>
  </div>

  <div class="card">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="receipt-icon">🧾</div>
      <p id="upload-text">Tap to scan a receipt photo</p>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="scanReceipt(event)" />
    <div id="scan-status"></div>
  </div>

  <div class="card" id="result-card" style="display:none;">
    <div class="section-label" id="result-restaurant">Receipt</div>
    <div id="items-list"></div>
    <div class="ledger-row" style="margin-top: 0.75rem;"><span>Subtotal</span><span class="amt" id="result-subtotal">$0.00</span></div>
    <div class="ledger-row"><span>Tax</span><span class="amt" id="result-tax">$0.00</span></div>
    <div class="ledger-row grand"><span>Total</span><span class="amt" id="result-total">$0.00</span></div>
    <button class="btn btn-text hidden" id="share-native-btn" onclick="shareReceipt()" style="margin-top: 1rem;">Share →</button>
    <div class="share-row" id="share-row" style="display:none;">
      <button class="btn btn-copy" id="copy-receipt-btn" onclick="copyReceiptText()">Copy Summary</button>
      <button class="btn btn-ghost" onclick="textReceipt()">Text Instead</button>
    </div>
  </div>

  <a class="btn btn-ghost" id="split-instead-link" href="/split" style="display:none; margin-top: 1rem; text-align:center; text-decoration:none;">Need to split this with someone? →</a>
</div>

<script>
function scanReceipt(event) {
  const file = event.target.files[0];
  if (!file) return;

  document.getElementById('upload-text').textContent = 'Scanning...';
  document.getElementById('scan-status').innerHTML = '<div class="hint"><span class="spinner" style="border-top-color: var(--pine); border-color: rgba(47,111,94,0.2);"></span>Reading receipt...</div>';

  const formData = new FormData();
  formData.append('image', file);

  fetch('/scan-receipt', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      document.getElementById('upload-text').textContent = 'Tap to scan another receipt';
      if (data.error) {
        document.getElementById('scan-status').innerHTML = `<div class="error-box">${data.error}</div>`;
        return;
      }
      document.getElementById('scan-status').innerHTML = '';
      renderResult(data);
    })
    .catch(() => {
      document.getElementById('upload-text').textContent = 'Tap to scan a receipt photo';
      document.getElementById('scan-status').innerHTML = '<div class="error-box">Scan failed. Please try again.</div>';
    });
}

let lastScannedData = null;

function renderResult(data) {
  lastScannedData = data;
  document.getElementById('result-restaurant').textContent = data.restaurant_name || 'Receipt';
  document.getElementById('items-list').innerHTML = (data.items || []).map(item => `
    <div class="scanned-item-row">
      <span>${item.name}${item.quantity > 1 ? ' ×' + item.quantity : ''}</span>
      <span class="amt">$${item.price.toFixed(2)}</span>
    </div>
  `).join('');
  document.getElementById('result-subtotal').textContent = '$' + (data.subtotal || 0).toFixed(2);
  document.getElementById('result-tax').textContent = '$' + (data.tax || 0).toFixed(2);
  document.getElementById('result-total').textContent = '$' + (data.total || 0).toFixed(2);
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('share-row').style.display = 'flex';
  document.getElementById('split-instead-link').style.display = 'block';

  // Native share (opens the phone's real share sheet — Messages, WhatsApp,
  // email, AirDrop, whatever's installed) when the browser supports it.
  // Falls back to Copy/Text buttons everywhere else.
  if (navigator.share) {
    document.getElementById('share-native-btn').classList.remove('hidden');
  }
}

function shareReceipt() {
  const text = buildReceiptSummary();
  const title = (lastScannedData && lastScannedData.restaurant_name) || 'Receipt';
  navigator.share({ title, text }).catch(() => {
    // User cancelled the share sheet, or the browser rejected it — no
    // error needed, they can still use Copy/Text below.
  });
}

function copyReceiptText() {
  const text = buildReceiptSummary();
  const btn = document.getElementById('copy-receipt-btn');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied ✓';
    setTimeout(() => { btn.textContent = 'Copy Summary'; }, 2000);
  }).catch(() => alert(text));
}

function textReceipt() {
  const message = buildReceiptSummary();
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const smsUrl = isIOS
    ? `sms:&body=${encodeURIComponent(message)}`
    : `sms:?body=${encodeURIComponent(message)}`;
  window.location.href = smsUrl;
}

function buildReceiptSummary() {
  if (!lastScannedData) return '';
  const d = lastScannedData;
  let lines = [`${d.restaurant_name || 'Receipt'}`];
  (d.items || []).forEach(item => {
    const qty = item.quantity > 1 ? ` ×${item.quantity}` : '';
    lines.push(`${item.name}${qty} — $${item.price.toFixed(2)}`);
  });
  lines.push('');
  lines.push(`Subtotal: $${(d.subtotal || 0).toFixed(2)}`);
  lines.push(`Tax: $${(d.tax || 0).toFixed(2)}`);
  lines.push(`Total: $${(d.total || 0).toFixed(2)}`);
  return lines.join('\n');
}
</script>
</body>
</html>

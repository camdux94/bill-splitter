<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split This Bill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="eyebrow">Split</div>
    <div class="page-title" id="restaurant-title">This bill</div>
    <p class="page-sub">Enter your name, tap what you had, set your tip.</p>
  </div>

  <div class="card" id="name-card">
    <div class="section-label">Your name</div>
    <input type="text" id="person-name-input" class="field" placeholder="e.g. Cameron" />
    <button class="btn" onclick="loadMySelections()">Continue</button>
  </div>

  <div id="main-content" class="hidden">
    <div class="tab-row">
      <div class="tab-btn active" id="tab-order" onclick="switchTab('order')">My Order</div>
      <div class="tab-btn" id="tab-tally" onclick="switchTab('tally')">Group Tally</div>
    </div>

    <div id="panel-order">
      <div class="card">
        <div class="section-label">What did you have?</div>
        <div id="items-list"></div>

        <div class="section-label" style="margin-top: 1.35rem;">Your tip</div>
        <div class="tip-row">
          <div class="tip-stamp" onclick="setTipPercent(15)">15%</div>
          <div class="tip-stamp" onclick="setTipPercent(18)">18%</div>
          <div class="tip-stamp" onclick="setTipPercent(20)">20%</div>
          <input type="number" class="tip-input" id="tip-amount-input" placeholder="$ custom" step="0.01" oninput="setTipCustom()" />
        </div>
        <div class="hint" id="tip-percent-display"></div>

        <div style="margin-top: 1.1rem;">
          <div class="ledger-row"><span>Your subtotal</span><span class="amt" id="my-subtotal">$0.00</span></div>
          <div class="ledger-row"><span>Your tax share</span><span class="amt" id="my-tax">$0.00</span></div>
          <div class="ledger-row"><span>Your tip</span><span class="amt" id="my-tip">$0.00</span></div>
          <div class="ledger-row grand"><span>You owe</span><span class="amt" id="my-total">$0.00</span></div>
        </div>
      </div>
    </div>

    <div id="panel-tally" class="hidden">
      <div class="card">
        <div class="section-label">Everyone's tally</div>
        <div id="people-list"></div>
      </div>
    </div>
  </div>

  <div id="error-wrap"></div>
</div>

<div class="bottom-bar-wrap hidden" id="bottom-bar-wrap">
  <div class="torn-edge"></div>
  <div class="bottom-bar">
    <div class="info">You owe<span class="amt" id="bar-total">$0.00</span></div>
  </div>
</div>

<script>
const billId = window.location.pathname.split('/').pop();
let currentPerson = '';
let billData = null;
let selectedItems = new Set();
let tipMode = null;

function switchTab(tab) {
  document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  document.getElementById('tab-tally').classList.toggle('active', tab === 'tally');
  document.getElementById('panel-order').classList.toggle('hidden', tab !== 'order');
  document.getElementById('panel-tally').classList.toggle('hidden', tab !== 'tally');
}

function loadMySelections() {
  const name = document.getElementById('person-name-input').value.trim();
  if (!name) return;
  currentPerson = name;
  document.getElementById('main-content').classList.remove('hidden');
  document.getElementById('bottom-bar-wrap').classList.remove('hidden');
  refreshData();
}

function refreshData() {
  fetch('/bill/' + billId + '/data')
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById('error-wrap').innerHTML = `<div class="hint">${data.error}</div>`;
        return;
      }
      billData = data;
      document.getElementById('restaurant-title').textContent = data.restaurant_name;

      const myClaims = data.claims.filter(c => c.person === currentPerson).map(c => c.item_id);
      selectedItems = new Set(myClaims);

      renderItems();
      renderTally();
      updateMyTotals();
    });
}

function renderItems() {
  const list = document.getElementById('items-list');
  list.innerHTML = billData.items.map(item => {
    const claimersForItem = billData.claims.filter(c => c.item_id === item.item_id).map(c => c.person);
    const isSelected = selectedItems.has(item.item_id);
    const splitCount = new Set(claimersForItem.concat(isSelected ? [currentPerson] : [])).size;
    const splitNote = splitCount > 1 ? `split ${splitCount} ways` : '';
    return `
      <div class="item-check ${isSelected ? 'selected' : ''}" onclick="toggleItem('${item.item_id}')">
        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${item.item_id}')" />
        <div class="iname">${item.name}<div class="isplit">${splitNote}</div></div>
        <div class="iprice">$${item.price.toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

function toggleItem(itemId) {
  if (selectedItems.has(itemId)) selectedItems.delete(itemId);
  else selectedItems.add(itemId);

  fetch('/bill/' + billId + '/claim', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: currentPerson, item_ids: Array.from(selectedItems) })
  }).then(() => refreshData());
}

function computeMySubtotal() {
  let subtotal = 0;
  billData.items.forEach(item => {
    if (selectedItems.has(item.item_id)) {
      const claimersForItem = billData.claims.filter(c => c.item_id === item.item_id).map(c => c.person);
      const allClaimers = new Set(claimersForItem.concat([currentPerson]));
      subtotal += item.price / allClaimers.size;
    }
  });
  return subtotal;
}

function setTipPercent(pct) {
  tipMode = 'percent';
  document.querySelectorAll('.tip-stamp').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const subtotal = computeMySubtotal();
  const tip = subtotal * (pct / 100);
  document.getElementById('tip-amount-input').value = tip.toFixed(2);
  submitTip(tip);
}

function setTipCustom() {
  document.querySelectorAll('.tip-stamp').forEach(b => b.classList.remove('active'));
  const tip = parseFloat(document.getElementById('tip-amount-input').value) || 0;
  submitTip(tip);
}

function submitTip(tip) {
  fetch('/bill/' + billId + '/tip', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: currentPerson, tip_amount: tip })
  }).then(() => refreshData());
}

function updateMyTotals() {
  const me = billData.people[currentPerson];
  if (!me) {
    document.getElementById('my-subtotal').textContent = '$0.00';
    document.getElementById('my-tax').textContent = '$0.00';
    document.getElementById('my-tip').textContent = '$0.00';
    document.getElementById('my-total').textContent = '$0.00';
    document.getElementById('bar-total').textContent = '$0.00';
    document.getElementById('tip-percent-display').textContent = '';
    return;
  }
  document.getElementById('my-subtotal').textContent = '$' + me.subtotal.toFixed(2);
  document.getElementById('my-tax').textContent = '$' + me.tax_share.toFixed(2);
  document.getElementById('my-tip').textContent = '$' + me.tip.toFixed(2);
  document.getElementById('my-total').textContent = '$' + me.total.toFixed(2);
  document.getElementById('bar-total').textContent = '$' + me.total.toFixed(2);
  document.getElementById('tip-percent-display').textContent = me.subtotal > 0
    ? `That's ${me.tip_percent}% of your subtotal`
    : '';
}

function renderTally() {
  const list = document.getElementById('people-list');
  const people = Object.keys(billData.people);
  if (people.length === 0) {
    list.innerHTML = '<div class="hint">No one has claimed any items yet.</div>';
    return;
  }
  list.innerHTML = people.map(person => {
    const p = billData.people[person];
    const links = p.payment_links;
    let payLinksHtml = '';
    if (links.venmo) payLinksHtml += `<a class="pay-link venmo" href="${links.venmo}" onclick="return openPayLink(event, '${links.venmo}')">Venmo</a>`;
    if (links.cashapp) payLinksHtml += `<a class="pay-link" href="${links.cashapp}" onclick="return openPayLink(event, '${links.cashapp}')">Cash App</a>`;
    if (links.zelle) payLinksHtml += `<span class="pay-link">Zelle: ${links.zelle.handle}</span>`;

    const stamp = p.paid ? '<div class="stamp-paid">Paid</div>' : '';

    return `
      <div class="person-card ${p.paid ? 'paid' : ''}">
        ${stamp}
        <div class="person-top">
          <div class="person-name">${person}</div>
          <div class="person-amount">$${p.total.toFixed(2)}</div>
        </div>
        <div class="person-meta">subtotal $${p.subtotal.toFixed(2)} + tax $${p.tax_share.toFixed(2)} + tip $${p.tip.toFixed(2)} (${p.tip_percent}%)</div>
        <div class="pay-links">
          ${payLinksHtml}
          <button class="paid-toggle ${p.paid ? 'is-paid' : ''}" onclick="togglePaid('${person}', ${!p.paid})">${p.paid ? '✓ Paid' : 'Mark as paid'}</button>
        </div>
      </div>
    `;
  }).join('');
}

function togglePaid(person, paid) {
  fetch('/bill/' + billId + '/paid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person, paid })
  }).then(() => refreshData());
}

let refreshPaused = false;

function openPayLink(event, url) {
  event.preventDefault();
  refreshPaused = true;
  window.open(url, '_blank');
  setTimeout(() => { refreshPaused = false; }, 1500);
  return false;
}

setInterval(() => { if (currentPerson && !refreshPaused) refreshData(); }, 4000);
</script>
</body>
</html>

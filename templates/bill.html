<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split This Bill</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0d130d; --border: rgba(0,255,65,0.25);
    --green: #00FF41; --green-dim: #00b82f; --text: #d8ffe0; --text-muted: #6fae7a; --text-hint: #4a7a52;
    --amber: #FFC64B; --red: #FF4B4B; --radius: 8px; --radius-sm: 5px;
  }
  body { font-family: 'Courier New', ui-monospace, monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 640px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--green); text-shadow: 0 0 8px rgba(0,255,65,0.4); }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1.25rem; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--green-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }
  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: #0a0f0a; outline: none; font-family: inherit; margin-bottom: 0.75rem;
  }
  .btn {
    padding: 12px 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    background: var(--green); color: #061006; border: none; border-radius: var(--radius-sm);
    cursor: pointer; text-transform: uppercase; width: 100%;
  }
  .btn:hover { background: #33ff66; }
  .btn-small { width: auto; padding: 8px 14px; font-size: 11px; }
  .item-check {
    display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer;
  }
  .item-check.selected { border-color: var(--green-dim); background: rgba(0,255,65,0.06); }
  .item-check input { width: 18px; height: 18px; accent-color: var(--green); }
  .item-check .iname { flex: 1; font-size: 13px; }
  .item-check .iprice { font-size: 13px; color: var(--green); font-weight: 700; }
  .item-check .isplit { font-size: 10px; color: var(--text-hint); }
  .tip-row { display: flex; gap: 8px; align-items: center; margin-top: 0.5rem; }
  .tip-btn { padding: 8px 12px; font-size: 12px; background: #0a0f0a; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; }
  .tip-btn.active { background: rgba(0,255,65,0.1); color: var(--green); border-color: var(--green-dim); }
  .tip-input { width: 90px; padding: 8px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #0a0f0a; color: var(--text); font-family: inherit; }
  .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); padding: 4px 0; }
  .total-row.grand { font-size: 18px; color: var(--green); font-weight: 700; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }
  .person-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
  .person-card.paid { border-color: rgba(0,255,65,0.4); background: rgba(0,255,65,0.04); }
  .person-top { display: flex; justify-content: space-between; align-items: center; }
  .person-name { font-size: 13px; font-weight: 700; }
  .person-amount { font-size: 16px; font-weight: 700; color: var(--green); }
  .person-meta { font-size: 11px; color: var(--text-hint); margin-top: 4px; }
  .pay-links { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .pay-link { font-size: 11px; padding: 6px 10px; border-radius: var(--radius-sm); text-decoration: none; border: 1px solid var(--border); color: var(--text); }
  .pay-link.venmo { border-color: rgba(0,255,65,0.4); color: var(--green); }
  .paid-toggle { font-size: 10px; padding: 4px 8px; border-radius: 12px; border: 1px solid var(--border); background: none; color: var(--text-muted); cursor: pointer; }
  .paid-toggle.is-paid { background: rgba(0,255,65,0.15); color: var(--green); border-color: var(--green-dim); }
  .hint { font-size: 11px; color: var(--text-hint); margin-top: 8px; line-height: 1.5; }
  .hidden { display: none !important; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,255,65,0.2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="restaurant-title">&gt; SPLIT THIS BILL</h1>
    <p>Enter your name, tap what you had, set your tip.</p>
  </div>

  <div class="card" id="name-card">
    <div class="section-label">Your name</div>
    <input type="text" id="person-name-input" placeholder="e.g. Cameron" class="field" />
    <button class="btn" onclick="loadMySelections()">Continue</button>
  </div>

  <div class="card hidden" id="claim-card">
    <div class="section-label">What did you have?</div>
    <div id="items-list"></div>

    <div class="section-label" style="margin-top: 1.5rem;">Your tip</div>
    <div class="tip-row">
      <div class="tip-btn" onclick="setTipPercent(15)">15%</div>
      <div class="tip-btn" onclick="setTipPercent(18)">18%</div>
      <div class="tip-btn" onclick="setTipPercent(20)">20%</div>
      <input type="number" class="tip-input" id="tip-amount-input" placeholder="$ amount" step="0.01" oninput="setTipCustom()" />
    </div>
    <div class="hint" id="tip-percent-display"></div>

    <div style="margin-top: 1.25rem;">
      <div class="total-row"><span>Your subtotal</span><span id="my-subtotal">$0.00</span></div>
      <div class="total-row"><span>Your tax share</span><span id="my-tax">$0.00</span></div>
      <div class="total-row"><span>Your tip</span><span id="my-tip">$0.00</span></div>
      <div class="total-row grand"><span>You owe</span><span id="my-total">$0.00</span></div>
    </div>
  </div>

  <div class="card hidden" id="tally-card">
    <div class="section-label">Everyone's tally</div>
    <div id="people-list"></div>
  </div>

  <div id="error-wrap"></div>
</div>

<script>
const billId = window.location.pathname.split('/').pop();
let currentPerson = '';
let billData = null;
let selectedItems = new Set();
let tipMode = null; // 'percent' or 'custom'

function loadMySelections() {
  const name = document.getElementById('person-name-input').value.trim();
  if (!name) return;
  currentPerson = name;
  document.getElementById('claim-card').classList.remove('hidden');
  document.getElementById('tally-card').classList.remove('hidden');
  refreshData();
}

function refreshData() {
  fetch('/bill/' + billId + '/data')
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        document.getElementById('error-wrap').innerHTML = `<div class="hint">${data.error}</div>`;
        return;
      }
      billData = data;
      document.getElementById('restaurant-title').textContent = '> ' + data.restaurant_name.toUpperCase();

      // Sync selectedItems with server state for current person
      const myClaims = data.claims.filter(c => c.person === currentPerson).map(c => c.item_id);
      selectedItems = new Set(myClaims);

      renderItems();
      renderTally();
      updateMyTotals();
    });
}

function renderItems() {
  const list = document.getElementById('items-list');
  list.innerHTML = billData.items.map(item => {
    const claimersForItem = billData.claims.filter(c => c.item_id === item.item_id).map(c => c.person);
    const isSelected = selectedItems.has(item.item_id);
    const splitCount = new Set(claimersForItem.concat(isSelected ? [currentPerson] : [])).size;
    const splitNote = splitCount > 1 ? `split ${splitCount} ways` : '';
    return `
      <div class="item-check ${isSelected ? 'selected' : ''}" onclick="toggleItem('${item.item_id}')">
        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${item.item_id}')" />
        <div class="iname">${item.name}<div class="isplit">${splitNote}</div></div>
        <div class="iprice">$${item.price.toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

function toggleItem(itemId) {
  if (selectedItems.has(itemId)) selectedItems.delete(itemId);
  else selectedItems.add(itemId);

  fetch('/bill/' + billId + '/claim', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: currentPerson, item_ids: Array.from(selectedItems) })
  }).then(() => refreshData());
}

function computeMySubtotal() {
  let subtotal = 0;
  billData.items.forEach(item => {
    if (selectedItems.has(item.item_id)) {
      const claimersForItem = billData.claims.filter(c => c.item_id === item.item_id).map(c => c.person);
      const allClaimers = new Set(claimersForItem.concat([currentPerson]));
      subtotal += item.price / allClaimers.size;
    }
  });
  return subtotal;
}

function setTipPercent(pct) {
  tipMode = 'percent';
  document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const subtotal = computeMySubtotal();
  const tip = subtotal * (pct / 100);
  document.getElementById('tip-amount-input').value = tip.toFixed(2);
  submitTip(tip);
}

function setTipCustom() {
  document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
  const tip = parseFloat(document.getElementById('tip-amount-input').value) || 0;
  submitTip(tip);
}

function submitTip(tip) {
  fetch('/bill/' + billId + '/tip', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person: currentPerson, tip_amount: tip })
  }).then(() => refreshData());
}

function updateMyTotals() {
  const me = billData.people[currentPerson];
  if (!me) {
    document.getElementById('my-subtotal').textContent = '$0.00';
    document.getElementById('my-tax').textContent = '$0.00';
    document.getElementById('my-tip').textContent = '$0.00';
    document.getElementById('my-total').textContent = '$0.00';
    document.getElementById('tip-percent-display').textContent = '';
    return;
  }
  document.getElementById('my-subtotal').textContent = '$' + me.subtotal.toFixed(2);
  document.getElementById('my-tax').textContent = '$' + me.tax_share.toFixed(2);
  document.getElementById('my-tip').textContent = '$' + me.tip.toFixed(2);
  document.getElementById('my-total').textContent = '$' + me.total.toFixed(2);
  document.getElementById('tip-percent-display').textContent = me.subtotal > 0
    ? `That's ${me.tip_percent}% of your subtotal`
    : '';
}

function renderTally() {
  const list = document.getElementById('people-list');
  const people = Object.keys(billData.people);
  if (people.length === 0) {
    list.innerHTML = '<div class="hint">No one has claimed any items yet.</div>';
    return;
  }
  list.innerHTML = people.map(person => {
    const p = billData.people[person];
    const links = p.payment_links;
    let payLinksHtml = '';
    if (links.venmo) payLinksHtml += `<a class="pay-link venmo" href="${links.venmo}" onclick="return openPayLink(event, '${links.venmo}')">Venmo</a>`;
    if (links.cashapp) payLinksHtml += `<a class="pay-link" href="${links.cashapp}" onclick="return openPayLink(event, '${links.cashapp}')">Cash App</a>`;
    if (links.zelle) payLinksHtml += `<span class="pay-link">Zelle: ${links.zelle.handle}</span>`;

    return `
      <div class="person-card ${p.paid ? 'paid' : ''}">
        <div class="person-top">
          <div class="person-name">${person}</div>
          <div class="person-amount">$${p.total.toFixed(2)}</div>
        </div>
        <div class="person-meta">subtotal $${p.subtotal.toFixed(2)} + tax $${p.tax_share.toFixed(2)} + tip $${p.tip.toFixed(2)} (${p.tip_percent}%)</div>
        <div class="pay-links">
          ${payLinksHtml}
          <button class="paid-toggle ${p.paid ? 'is-paid' : ''}" onclick="togglePaid('${person}', ${!p.paid})">${p.paid ? '✓ Paid' : 'Mark as paid'}</button>
        </div>
      </div>
    `;
  }).join('');
}

function togglePaid(person, paid) {
  fetch('/bill/' + billId + '/paid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person, paid })
  }).then(() => refreshData());
}

let refreshPaused = false;

function openPayLink(event, url) {
  event.preventDefault();
  // Briefly pause the auto-refresh so the tally list can't re-render and
  // swap this element out from under a tap that's still in flight.
  refreshPaused = true;
  window.open(url, '_blank');
  setTimeout(() => { refreshPaused = false; }, 1500);
  return false;
}

setInterval(() => { if (currentPerson && !refreshPaused) refreshData(); }, 4000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<meta name="theme-color" content="#2F6F5E">
<style>
  .back-link {
    display: inline-flex; align-items: center; gap: 4px; font-size: 12px;
    color: var(--ink-soft); text-decoration: none; margin-bottom: 1rem;
  }
  .result-display { text-align: center; padding: 1.5rem 0; }
  .result-display .amt { font-family: var(--font-mono); font-size: 44px; font-weight: 700; color: var(--pine); }
  .result-display .lbl { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .per-person-note { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="/">← Home</a>
  <div class="header">
    <div class="eyebrow">Tip Calculator</div>
    <div class="page-title">Quick tip math</div>
    <p class="page-sub">Figure the tip, the total, and — if you're splitting — everyone's share.</p>
  </div>

  <div class="card">
    <div class="field">
      <label>Bill amount</label>
      <input type="number" class="mono" id="bill-amount" step="0.01" placeholder="0.00" oninput="calculate()" />
    </div>

    <div class="section-label" style="margin-top: 1rem;">Tip percentage</div>
    <div class="tip-row">
      <div class="tip-stamp" onclick="setTipPct(15)">15%</div>
      <div class="tip-stamp" onclick="setTipPct(18)">18%</div>
      <div class="tip-stamp" onclick="setTipPct(20)">20%</div>
      <div class="tip-stamp" onclick="setTipPct(25)">25%</div>
      <input type="number" class="tip-input" id="tip-pct-input" placeholder="custom %" oninput="onCustomPct()" />
    </div>

    <div class="field" style="margin-top: 1rem;">
      <label>Split between how many people?</label>
      <input type="number" class="mono" id="split-count" placeholder="1" min="1" oninput="calculate()" />
    </div>
  </div>

  <div class="card" id="result-card" style="display:none;">
    <div class="result-display">
      <div class="amt" id="result-total">$0.00</div>
      <div class="lbl">Total with tip</div>
      <div class="per-person-note" id="per-person-note"></div>
    </div>
    <div class="ledger-row"><span>Bill</span><span class="amt" id="result-bill">$0.00</span></div>
    <div class="ledger-row"><span>Tip</span><span class="amt" id="result-tip">$0.00</span></div>
  </div>
</div>

<script>
let currentPct = null;

function setTipPct(pct) {
  currentPct = pct;
  document.getElementById('tip-pct-input').value = pct;
  document.querySelectorAll('.tip-stamp').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  calculate();
}

function onCustomPct() {
  document.querySelectorAll('.tip-stamp').forEach(b => b.classList.remove('active'));
  currentPct = parseFloat(document.getElementById('tip-pct-input').value);
  calculate();
}

function calculate() {
  const bill = parseFloat(document.getElementById('bill-amount').value);
  const pct = parseFloat(document.getElementById('tip-pct-input').value);
  const splitCount = Math.max(1, parseInt(document.getElementById('split-count').value) || 1);

  if (isNaN(bill) || bill <= 0 || isNaN(pct)) {
    document.getElementById('result-card').style.display = 'none';
    return;
  }

  const tip = bill * (pct / 100);
  const total = bill + tip;

  document.getElementById('result-total').textContent = '$' + total.toFixed(2);
  document.getElementById('result-bill').textContent = '$' + bill.toFixed(2);
  document.getElementById('result-tip').textContent = '$' + tip.toFixed(2);

  const perPersonNote = document.getElementById('per-person-note');
  if (splitCount > 1) {
    perPersonNote.textContent = `$${(total / splitCount).toFixed(2)} per person (${splitCount} people)`;
  } else {
    perPersonNote.textContent = '';
  }

  document.getElementById('result-card').style.display = 'block';
}
</script>
</body>
</html>
